<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>蓮境：周敦頤的最後考驗</title>
  <meta name="description" content="一款以〈愛蓮說〉為核心的沉浸式古風密室逃脫閱讀素養遊戲。" />
<style>
/* ===== reset.css — 樣式重置 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  color: var(--ink-black);
  background: #0d0c0a;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
img { display: block; max-width: 100%; -webkit-user-drag: none; }
ul, ol { list-style: none; }
button, input { font-family: inherit; color: inherit; background: none; border: none; outline: none; }
/* 全案禁用原生 button 外觀，一律以自繪熱區呈現 */
button { cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ===== tokens.css — Design Tokens（對應 Phase 4 色彩/字體規範） ===== */
:root {
  /* 色彩 */
  --ink-black:   #1C1B18;   /* 墨黑：主文字、描邊 */
  --ink-soft:    #4A4640;   /* 淡墨：次要文字、陰影 */
  --rice-white:  #F3ECDD;   /* 米白：背景底、宣紙 */
  --rice-deep:   #E4D8C0;   /* 舊宣：面板次層 */
  --celadon:     #6E8B7A;   /* 青綠：主強調、可互動描邊 */
  --celadon-deep:#47604F;   /* 深青：hover/選中 */
  --gold-light:  #C9A96A;   /* 淺金：點綴、成就、高亮 */
  --seal-red:    #9E4B3B;   /* 印泥朱：僅蓋章瞬間，面積 <3% */

  /* 半透明宣紙面板 */
  --paper-panel: rgba(243, 236, 221, 0.94);
  --paper-veil:  rgba(28, 27, 24, 0.55);

  /* 字體 */
  --font-title: "Noto Serif TC", "Source Han Serif TC", "楷體", "KaiTi", serif;
  --font-body:  "Noto Serif TC", "Source Han Serif TC", "宋體", "SimSun", serif;

  /* 字級 */
  --fs-title: 40px;
  --fs-h2:    28px;
  --fs-dialogue: 22px;
  --fs-body:  18px;
  --fs-note:  15px;

  /* 間距與圓角 */
  --gap-s: 8px;  --gap-m: 16px;  --gap-l: 28px;
  --radius: 6px;

  /* 動畫緩動（統一柔和曲線） */
  --ease-soft: cubic-bezier(0.4, 0.0, 0.2, 1);
  --dur-fast: 0.2s;  --dur-mid: 0.6s;  --dur-slow: 1.2s;

  /* 舞台基準 */
  --stage-w: 1920px;
  --stage-h: 1080px;

  /* z-index 層級（對應 Phase 4） */
  --z-scene: 10; --z-hud: 20; --z-dialogue: 30;
  --z-panel: 40; --z-overlay: 50; --z-toast: 60; --z-boot: 100;
}

/* ===== layout.css — 舞台與 HUD 網格 ===== */

/* 16:9 舞台等比縮放置中 */
#viewport {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0d0c0a;
}
#game-root {
  position: relative;
  width: var(--stage-w);
  height: var(--stage-h);
  transform-origin: center center;
  background: var(--rice-white);
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
}
.layer { position: absolute; inset: 0; }
#scene-layer    { z-index: var(--z-scene); }
/* 覆蓋層容器一律不攔截事件，只有其子元素（實際 UI）才接收點擊，
   避免空的上層 layer 蓋住下層可互動內容 */
#hud-layer, #dialogue-layer, #panel-layer, #overlay-layer, #toast-layer {
  pointer-events: none;
}
#hud-layer > *, #dialogue-layer > *, #panel-layer > *,
#overlay-layer > *, #toast-layer > * { pointer-events: auto; }
#hud-layer      { z-index: var(--z-hud); }
#dialogue-layer { z-index: var(--z-dialogue); }
#panel-layer    { z-index: var(--z-panel); }
#overlay-layer  { z-index: var(--z-overlay); }
#toast-layer    { z-index: var(--z-toast); }

/* HUD 四角定位 */
.hud-topleft     { position:absolute; top: 24px; left: 24px; }
.hud-topright    { position:absolute; top: 24px; right: 24px; }
.hud-bottomleft  { position:absolute; bottom: 24px; left: 24px; }
.hud-bottomright { position:absolute; bottom: 24px; right: 24px; }

/* 載入畫面 */
#boot-screen {
  position: fixed; inset: 0; z-index: var(--z-boot);
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 50% 45%, #201d18, #0d0c0a 75%);
  transition: opacity 0.8s var(--ease-soft);
}
#boot-screen.hide { opacity: 0; pointer-events: none; }
.boot-inner { text-align: center; color: var(--rice-white); }
.boot-ink {
  font-family: var(--font-title); font-size: 120px; color: var(--celadon);
  text-shadow: 0 0 30px rgba(110,139,122,0.5);
}
.boot-title { font-family: var(--font-title); font-size: 44px; letter-spacing: 12px; margin-top: 8px; }
.boot-sub   { font-family: var(--font-body); font-size: 20px; color: var(--gold-light); letter-spacing: 6px; margin-top: 6px; }
.boot-loading { font-size: 15px; color: var(--ink-soft); margin-top: 40px; letter-spacing: 3px; }

/* ===== ui.css — 古風 UI 元件 ===== */

/* 共用 HUD 元件 */
.hud-item { display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity var(--dur-mid) var(--ease-soft); }
.hud-cap, .seal-cap, .jade-seal-cap {
  font-family: var(--font-title); font-size: 14px; letter-spacing: 3px; color: var(--rice-white);
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
.hud-topleft, .hud-topright, .hud-bottomleft, .hud-bottomright { transition: opacity var(--dur-mid) var(--ease-soft); }

/* 章節牌（左上） */
.chapter-tag {
  padding: 10px 18px; background: var(--paper-panel);
  border: 1px solid rgba(110,139,122,0.5); border-radius: var(--radius);
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
}
.chapter-text { font-family: var(--font-title); font-size: var(--fs-body); color: var(--ink-black); letter-spacing: 3px; }

/* 香炷計時（右上） */
.incense-timer { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.incense-svg { width: 26px; height: 78px; }
.timer-text { font-family: var(--font-title); font-size: var(--fs-body); color: var(--rice-white); text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
.timer-total { font-size: 12px; color: var(--gold-light); letter-spacing: 1px; }

/* 燈籠（右下） */
.lantern { cursor: pointer; }
.lantern-svg { width: 56px; height: 84px; }
.lantern .lantern-body { transition: filter var(--dur-mid) var(--ease-soft); }
.lantern.lit .lantern-body { filter: drop-shadow(0 0 10px var(--gold-light)); }

/* 竹編背包（左下）；不設 position 以免覆蓋 .hud-bottomleft 的絕對定位 */
.bamboo-bag { cursor: pointer; }
.bag-svg { width: 64px; height: 58px; transition: transform var(--dur-fast) var(--ease-soft); }
.bamboo-bag:hover .bag-svg, .bamboo-bag:focus .bag-svg { transform: translateY(-3px); }
.bamboo-bag.flash .bag-svg { filter: drop-shadow(0 0 12px var(--gold-light)); }
.bag-panel {
  position: absolute; bottom: 84px; left: 0; width: 340px;
  background: var(--paper-panel); border: 1px solid rgba(110,139,122,0.5);
  border-radius: var(--radius); padding: var(--gap-m); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity: 0; transform: translateY(8px); transition: opacity .25s var(--ease-soft), transform .25s var(--ease-soft);
}
.bag-panel.show { opacity: 1; transform: translateY(0); }
.bag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap-s); }
.bag-cell { display: flex; flex-direction: column; align-items: center; font-size: 24px; color: var(--ink-black); }
.bag-cell span { font-size: 11px; margin-top: 2px; color: var(--ink-soft); }
.bag-empty { text-align: center; color: var(--ink-soft); font-size: var(--fs-note); }

/* 印章（開始/主要動作） */
.seal-button { display: inline-flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.seal-svg { width: 108px; height: 108px; transition: transform var(--dur-fast) var(--ease-soft), filter var(--dur-fast) var(--ease-soft); }
.seal-button:hover .seal-svg, .seal-button:focus .seal-svg { transform: translateY(-2px); filter: drop-shadow(0 0 10px rgba(158,75,59,0.5)); }

/* 玉璽（確認） */
.jade-seal { display: inline-flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.jade-seal-svg { width: 76px; height: 76px; transition: transform var(--dur-fast) var(--ease-soft); }
.jade-seal:hover .jade-seal-svg, .jade-seal:focus .jade-seal-svg { transform: translateY(-2px); }
.jade-seal.disabled { opacity: .4; pointer-events: none; }

/* 卷軸面板 */
.scroll-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60%; max-width: 760px; }
.scroll-roller { height: 16px; background: linear-gradient(#8a6b3f, #6b5230); border-radius: 8px; box-shadow: 0 3px 8px rgba(0,0,0,0.4); }
.scroll-paper {
  background: var(--paper-panel); border-left: 1px solid rgba(110,139,122,0.4); border-right: 1px solid rgba(110,139,122,0.4);
  padding: var(--gap-l) 48px; max-height: 0; overflow: hidden; transition: max-height .5s var(--ease-soft), padding .5s var(--ease-soft);
}
.scroll-panel.unroll .scroll-paper { max-height: 70vh; overflow: auto; }
.scroll-panel.rolling .scroll-paper { max-height: 0; padding-top: 0; padding-bottom: 0; }
.scroll-title { font-family: var(--font-title); font-size: var(--fs-h2); color: var(--ink-black); text-align: center; margin-bottom: var(--gap-m); letter-spacing: 3px; }
.scroll-content { font-size: var(--fs-body); line-height: 2; color: var(--ink-black); letter-spacing: 1px; }
.scroll-back { text-align: center; margin-top: var(--gap-l); font-family: var(--font-title); color: var(--celadon-deep); letter-spacing: 4px; cursor: pointer; padding: 8px; border-radius: var(--radius); }
.scroll-back:hover, .scroll-back:focus { color: var(--gold-light); background: rgba(110,139,122,0.12); outline: none; }

/* ===== animations.css — 環境與互動動畫 ===== */

/* ---- 印章蓋章 ---- */
@keyframes seal-stamp {
  0% { transform: translateY(-14px) scale(1.04); }
  45% { transform: translateY(2px) scale(0.97); }
  100% { transform: translateY(0) scale(1); }
}
.seal-button.stamp .seal-svg { animation: seal-stamp .26s var(--ease-soft); }

/* ---- 玉璽下沉 + 印泥暈染 ---- */
@keyframes jade-press { 0%{transform:translateY(0);} 40%{transform:translateY(4px) scale(.96);} 100%{transform:translateY(0);} }
@keyframes ink-bloom { 0%{opacity:.6; transform:scale(.4);} 100%{opacity:0; transform:scale(1.6);} }
.jade-seal.stamping .jade-seal-svg { animation: jade-press .3s var(--ease-soft); }
.jade-seal.stamping::after {
  content:""; position:absolute; inset:0; margin:auto; width:60px; height:60px; border-radius:8px;
  background: radial-gradient(circle, rgba(158,75,59,.5), transparent 70%);
  animation: ink-bloom .5s var(--ease-soft) forwards;
}
.jade-seal { position: relative; }

/* ---- 荷葉飄動 ---- */
@keyframes lotus-sway { 0%,100%{transform:rotate(-3deg);} 50%{transform:rotate(3deg);} }
.anim-lotus-sway { animation: lotus-sway 5s var(--ease-soft) infinite; transform-origin: bottom center; }

/* ---- 水波擴散 ---- */
@keyframes ripple { 0%{opacity:.5; transform:scale(.2);} 100%{opacity:0; transform:scale(2.4);} }
.fx-ripple { position:absolute; border:2px solid var(--celadon); border-radius:50%; width:80px; height:80px; pointer-events:none; animation: ripple .8s var(--ease-soft) forwards; }

/* ---- 花瓣飄落 ---- */
@keyframes petal-fall { 0%{opacity:0; transform:translateY(-20px) rotate(0);} 15%{opacity:.9;} 100%{opacity:0; transform:translateY(420px) rotate(220deg);} }
.fx-petal { position:absolute; width:14px; height:14px; background:radial-gradient(circle at 30% 30%, #f5e6d0, #d8b98a); border-radius:0 60% 0 60%; pointer-events:none; animation: petal-fall 9s linear infinite; }

/* ---- 風吹竹林 ---- */
@keyframes bamboo-bend { 0%,100%{transform:skewX(0);} 50%{transform:skewX(-3deg);} }
.anim-bamboo { animation: bamboo-bend 5s var(--ease-soft) infinite; transform-origin: bottom; }

/* ---- 燈籠晃動 ---- */
@keyframes lantern-swing { 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }
.lantern .lantern-svg { animation: lantern-swing 3.4s var(--ease-soft) infinite; transform-origin: top center; }

/* ---- 石門開啟（位移） ---- */
@keyframes door-open-l { to { transform: translateX(-100%);} }
@keyframes door-open-r { to { transform: translateX(100%);} }
.fx-door-l { animation: door-open-l 1.2s var(--ease-soft) forwards; }
.fx-door-r { animation: door-open-r 1.2s var(--ease-soft) forwards; }

/* ---- 書頁翻動 ---- */
@keyframes page-turn { 0%{transform:rotateY(0);} 100%{transform:rotateY(-160deg);} }
.fx-page-turn { transform-origin: left center; animation: page-turn .6s var(--ease-soft) forwards; backface-visibility:hidden; }

/* ---- 墨跡暈開（顯字/過場輔助） ---- */
@keyframes ink-reveal { 0%{opacity:0; filter:blur(8px);} 100%{opacity:1; filter:blur(0);} }
.fx-ink-reveal { animation: ink-reveal 1.2s var(--ease-soft) forwards; }

/* ---- 蓮花綻放（成就） ---- */
@keyframes lotus-bloom { 0%{opacity:0; transform:scale(.3) rotate(-20deg);} 60%{opacity:1;} 100%{opacity:1; transform:scale(1) rotate(0);} }
.fx-lotus-bloom { animation: lotus-bloom .8s var(--ease-soft) forwards; }

/* 尊重使用者減少動態偏好 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
}

/* ===== screens.css — 各畫面樣式 ===== */

#scene-layer .scene,
#scene-layer .scene-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.scene { font-family: var(--font-title); color: var(--ink-soft); }
.scene-placeholder { font-size: 26px; letter-spacing: 6px; opacity: .7; }

/* ---- 墨跡過場遮罩 ---- */
.ink-transition {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(circle at 50% 50%, rgba(28,27,24,0.0), rgba(28,27,24,1) 70%);
  opacity: 0;
  transition: opacity 0.7s var(--ease-soft);
  pointer-events: none;
}
.ink-transition.active { opacity: 1; }
.ink-transition.leaving { opacity: 0; }

/* ---- 通用「宣紙面板」 ---- */
.op-paper, .tut-paper {
  max-width: 60%; padding: var(--gap-l) 56px;
  background: var(--paper-panel);
  border: 1px solid rgba(110,139,122,0.35);
  border-radius: var(--radius);
  box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 0 60px rgba(228,216,192,0.4);
  text-align: center;
}

/* ---- 開場 ---- */
.scene-opening { background: radial-gradient(circle at 50% 40%, #26221b, #0d0c0a 80%); }
.op-verse {
  font-family: var(--font-title); font-size: var(--fs-h2); color: var(--ink-black);
  letter-spacing: 4px; opacity: 0; filter: blur(6px);
  transition: opacity 1.2s var(--ease-soft), filter 1.2s var(--ease-soft);
}
.op-verse.ink-in { opacity: 1; filter: blur(0); }
.op-narr {
  margin-top: var(--gap-l); font-size: var(--fs-body); line-height: 1.9;
  color: var(--ink-soft); letter-spacing: 2px;
}
.op-enter {
  display: inline-block; margin-top: var(--gap-l);
  font-family: var(--font-title); font-size: var(--fs-body);
  color: var(--celadon-deep); letter-spacing: 6px; cursor: pointer;
  padding: 10px 24px; border-radius: var(--radius);
  transition: color var(--dur-fast) var(--ease-soft), background var(--dur-fast) var(--ease-soft);
}
.op-enter:hover, .op-enter:focus { color: var(--gold-light); background: rgba(110,139,122,0.12); outline: none; }

/* ---- 教學 ---- */
.scene-tutorial { background: radial-gradient(circle at 50% 45%, #2a2a22, #14130f 80%); }
.tut-name { font-family: var(--font-title); font-size: var(--fs-body); color: var(--celadon); letter-spacing: 4px; margin-bottom: var(--gap-m); }
.tut-line { font-size: var(--fs-dialogue); line-height: 2; color: var(--ink-black); letter-spacing: 2px; }

/* ===== 對話框 ===== */
.dialogue-box {
  position: absolute; left: 50%; bottom: 60px; transform: translateX(-50%);
  width: 70%; max-width: 900px; min-height: 120px;
  background: var(--paper-panel); border: 1px solid rgba(110,139,122,0.5);
  border-radius: var(--radius); padding: 22px 32px; cursor: pointer;
  box-shadow: 0 10px 34px rgba(0,0,0,0.4);
}
.dlg-npc { font-family: var(--font-title); font-size: var(--fs-body); color: var(--celadon-deep); letter-spacing: 3px; margin-bottom: 8px; }
.dlg-text { font-size: var(--fs-dialogue); line-height: 1.9; color: var(--ink-black); letter-spacing: 1px; min-height: 1.9em; }
.dlg-more { position: absolute; right: 20px; bottom: 12px; color: var(--celadon); animation: lantern-swing 1.2s infinite; }
.dlg-options { margin-top: var(--gap-m); display: flex; flex-direction: column; gap: 10px; }
.dlg-opt { padding: 12px 18px; background: var(--rice-deep); border: 1px solid rgba(110,139,122,0.4); border-radius: var(--radius); font-size: var(--fs-body); color: var(--ink-black); transition: background var(--dur-fast), color var(--dur-fast); }
.dlg-opt:hover, .dlg-opt:focus { background: var(--celadon); color: var(--rice-white); outline: none; }

/* ===== 謎題面板 ===== */
.puzzle-host {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: 72%; max-width: 900px; max-height: 80vh; overflow: auto;
  background: var(--paper-panel); border: 1px solid rgba(110,139,122,0.5);
  border-radius: var(--radius); padding: var(--gap-l) 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.pz-prompt { font-family: var(--font-title); font-size: var(--fs-body); color: var(--ink-black); letter-spacing: 2px; margin-bottom: var(--gap-m); line-height: 1.8; }
.pz-tip { margin-top: var(--gap-m); font-size: var(--fs-note); color: var(--ink-soft); }
.pz-done { box-shadow: 0 0 0 2px var(--celadon), 0 12px 40px rgba(0,0,0,0.45); }

/* 語序 */
.pz-slots { min-height: 48px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border-bottom: 2px dashed rgba(110,139,122,0.4); margin-bottom: var(--gap-m); }
.pz-slot { padding: 8px 14px; background: var(--celadon); color: var(--rice-white); border-radius: var(--radius); font-size: var(--fs-body); cursor: pointer; }
.pz-pool { display: flex; flex-wrap: wrap; gap: 10px; }
.pz-chip { padding: 10px 16px; background: var(--rice-deep); border: 1px solid rgba(110,139,122,0.4); border-radius: var(--radius); font-size: var(--fs-body); color: var(--ink-black); cursor: pointer; transition: opacity var(--dur-fast); }
.pz-chip.seg { max-width: 100%; line-height: 1.6; }
.pz-chip.used { opacity: .25; pointer-events: none; }

/* 配對 */
.pz-match { display: flex; gap: 40px; justify-content: center; }
.pz-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.pz-item { padding: 12px 16px; background: var(--rice-deep); border: 1px solid rgba(110,139,122,0.4); border-radius: var(--radius); font-size: var(--fs-body); color: var(--ink-black); cursor: pointer; text-align: center; transition: background var(--dur-fast); }
.pz-item.sel { background: var(--gold-light); color: var(--ink-black); }
.pz-item.matched { background: var(--celadon); color: var(--rice-white); pointer-events: none; }
.pz-item.wrong { background: var(--seal-red); color: var(--rice-white); }

/* 篩選 */
.pz-filter { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.pz-flower { padding: 18px 24px; background: var(--rice-deep); border: 1px solid rgba(110,139,122,0.4); border-radius: var(--radius); font-size: var(--fs-body); color: var(--ink-black); cursor: pointer; transition: all var(--dur-fast); }
.pz-flower.removed { opacity: .28; text-decoration: line-through; }
.pz-flower.wrong { background: var(--seal-red); color: var(--rice-white); }

/* 顯影 */
.reveal-wall { position: relative; height: 120px; background: linear-gradient(#3a352b,#2a271f); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.reveal-target { font-family: var(--font-title); font-size: 30px; letter-spacing: 6px; color: var(--rice-white); opacity: 0; }
.reveal-target.shown { opacity: 1; }
.mud-spot { position: absolute; top: 20%; width: 56px; height: 70px; background: radial-gradient(circle,#4a3f2c,#2a2418); border-radius: 40%; cursor: pointer; transition: opacity .4s; }
.mud-spot.wiped { opacity: 0; pointer-events: none; }

/* 機關 */
.mech-stage { text-align: center; margin-bottom: var(--gap-m); }
.mech-target { display: block; font-family: var(--font-title); font-size: 26px; letter-spacing: 5px; color: var(--ink-black); opacity: .25; transition: opacity .6s; }
.mech-target.shown { opacity: 1; }
.mech-gauge { height: 12px; background: var(--rice-deep); border-radius: 6px; overflow: hidden; margin-top: 12px; }
.mech-fill { height: 100%; background: var(--celadon); transition: width .4s var(--ease-soft); }
.mech-knob { margin: 0 auto; margin-top: var(--gap-m); width: fit-content; padding: 12px 22px; background: var(--celadon-deep); color: var(--rice-white); border-radius: var(--radius); font-family: var(--font-title); letter-spacing: 2px; cursor: pointer; }
.mech-knob:hover, .mech-knob:focus { background: var(--celadon); outline: none; }

/* 佔位場景可互動熱區 */
.hotspot { position: absolute; cursor: pointer; border-radius: 8px; transition: box-shadow var(--dur-fast); }
.hotspot:hover, .hotspot:focus { box-shadow: 0 0 0 2px var(--gold-light); outline: none; }

/* ===== level.css — 關卡場景樣式 ===== */
.scene-level { flex-direction: column; }
.level-bg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.level-bg-label { font-family: var(--font-title); font-size: 24px; letter-spacing: 6px; color: var(--ink-soft); opacity: .5; }

/* 各關背景色調（暫以漸層代真實背景圖，接美術後替換 background-image） */
.scene-level1 .level-bg { background: radial-gradient(circle at 50% 60%, #3a352b, #17150f); }
.scene-level2 .level-bg { background: radial-gradient(circle at 50% 50%, #2f3a2c, #14170f); }
.scene-level3 .level-bg { background: radial-gradient(circle at 50% 50%, #26332b, #101711); }
.scene-level4 .level-bg { background: radial-gradient(circle at 50% 45%, #33302a, #14120d); }
.scene-level5 .level-bg { background: radial-gradient(circle at 50% 40%, #2b3a38, #101615); }

/* 彩蛋熱區 */
.egg-spot {
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--gold-light); background: rgba(201,169,106,0.12);
  border: 1px solid rgba(201,169,106,0.4); z-index: 2;
  animation: lantern-swing 3s var(--ease-soft) infinite;
}
.egg-spot.found { color: var(--celadon); background: rgba(110,139,122,0.16); animation: none; }

/* 動作列 */
.level-actions {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 3; text-align: center;
}
.level-explore-tip { font-size: var(--fs-note); color: var(--gold-light); letter-spacing: 1px; opacity: .9; }
.level-begin { background: rgba(243,236,221,0.9); }

/* 殘句展示 */
.verse-line { font-family: var(--font-title); font-size: 26px; color: var(--celadon-deep); letter-spacing: 4px; text-align: center; margin-bottom: 12px; }

/* ===== result.css — 結局 + 結算 + 通知 ===== */

/* 結局 */
.scene-ending { background: radial-gradient(circle at 50% 40%, #2b3a38, #0d0c0a 82%); }
.ending-paper { max-width: 62%; text-align: center; padding: var(--gap-l) 56px;
  background: var(--paper-panel); border-radius: var(--radius); box-shadow: 0 12px 44px rgba(0,0,0,0.45); }
.ending-title { font-family: var(--font-title); font-size: var(--fs-title); color: var(--celadon-deep); letter-spacing: 6px; margin-bottom: var(--gap-l); }
.ending-text { font-size: var(--fs-dialogue); line-height: 2.1; color: var(--ink-black); letter-spacing: 1px; }
.ending-verse { margin-top: var(--gap-l); font-family: var(--font-title); font-size: 24px; color: var(--gold-light); letter-spacing: 4px; }

/* 結算 */
.scene-result { background: radial-gradient(circle at 50% 40%, #26221b, #0d0c0a 82%); overflow: auto; }
.result-scroll { width: 78%; max-width: 860px; max-height: 92vh; overflow: auto; text-align: center;
  background: var(--paper-panel); border-radius: var(--radius); padding: var(--gap-l) 48px; box-shadow: 0 12px 44px rgba(0,0,0,0.5); }
.result-head { font-family: var(--font-title); font-size: 34px; color: var(--ink-black); letter-spacing: 6px; }
.result-title { margin-top: 8px; font-size: var(--fs-body); color: var(--ink-soft); }
.result-title b { color: var(--seal-red); font-size: var(--fs-h2); letter-spacing: 3px; }
.result-grid { display: flex; justify-content: center; gap: var(--gap-l); flex-wrap: wrap; margin: var(--gap-l) 0; }
.result-metric { display: flex; flex-direction: column; gap: 6px; }
.result-metric span { font-size: var(--fs-note); color: var(--ink-soft); }
.result-metric b { font-family: var(--font-title); font-size: 26px; color: var(--celadon-deep); }
.result-radar { display: flex; justify-content: center; }
.result-radar-note { font-size: var(--fs-note); color: var(--ink-soft); margin-top: 4px; }
.result-ach { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: var(--gap-l) 0; }
.ach-chip { padding: 6px 12px; background: var(--rice-deep); border: 1px solid rgba(201,169,106,0.5); border-radius: var(--radius); font-size: var(--fs-note); color: var(--ink-black); }
.result-actions { margin-top: var(--gap-m); }

/* 成就通知 */
.toast {
  position: absolute; top: 90px; right: 24px; width: 300px;
  display: flex; gap: 12px; align-items: center;
  background: var(--paper-panel); border: 1px solid rgba(201,169,106,0.6);
  border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.leaving { opacity: 0; transform: translateX(20px); transition: all .6s var(--ease-soft); }
.toast-lotus { font-size: 28px; color: var(--gold-light); }
.toast-kind { font-size: 12px; color: var(--celadon-deep); letter-spacing: 2px; }
.toast-title { font-family: var(--font-title); font-size: var(--fs-body); color: var(--ink-black); }
.toast-desc { font-size: 12px; color: var(--ink-soft); }
.toast + .toast { top: 190px; }

        this.idleMs = 0;

      if (this.save?.data) {
        this.save.data.time.total = this.total;
        this.save.data.time.perLevel[this.levelId] = CONFIG.levelSeconds - this.remain;
      }
      bus.emit("timer:tick", { remain: this.remain, total: this.total, level: this.levelId });
      if (this.idleMs >= CONFIG.idleHintMs) {
        this.idleMs = 0;
        bus.emit("idle:timeout", { level: this.levelId });

    _unlock() {

      try {

    _tone(freq, dur = 0.3, type = "sine", gainVal = 0.12) {
      if (!this.ctx || !this.enabled) return;
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = gainVal;
      g.gain.exponentialRampToValueAtTime(1e-4, this.ctx.currentTime + dur);
      o.connect(g);
      g.connect(this.ctx.destination);
      o.start();
      o.stop(this.ctx.currentTime + dur);
    }

    playBgm(track) {
      this._unlock();
      if (!this.ctx || !this.enabled) return;
      if (this._bgmTimer) clearInterval(this._bgmTimer);
      const scales = {
        bgm_lv1: [262, 294, 330, 392, 440],
        bgm_lv2: [294, 330, 392, 440, 494],
        bgm_lv3: [220, 262, 294, 330, 392],
        bgm_lv4: [196, 220, 262, 294, 330],
        bgm_lv5: [262, 330, 392, 440, 523],
        bgm_opening: [262, 294, 330, 392, 440],
        bgm_ending: [330, 392, 440, 523, 587]
      };
      const scale = scales[track] || scales.bgm_opening;
      let i = 0;
      this._bgmTimer = setInterval(() => {
        if (!this.enabled) return;
        this._tone(scale[i % scale.length], 0.6, "triangle", 0.05);
        i++;
      }, 900);
    }
    sfx(name) {
      this._unlock();
      switch (name) {
        case "correct":
          this._tone(523, 0.25, "sine", 0.14);
          setTimeout(() => this._tone(659, 0.3, "sine", 0.12), 120);
          break;
        case "soft_fail":
          this._tone(196, 0.35, "sine", 0.1);
          break;
        case "pickup":
          this._tone(440, 0.15, "triangle", 0.12);
          break;
        case "achievement":
          this._tone(587, 0.2, "sine", 0.14);
          setTimeout(() => this._tone(784, 0.4, "sine", 0.12), 150);
          break;
        default:

    }

    toast(kind, title, desc) {
      const el = document.createElement("div");
      el.className = "toast fx-lotus-bloom";
      el.innerHTML = `
      <span class="toast-lotus">✽</span>
      <div class="toast-body"><p class="toast-kind">${kind}</p>
      <p class="toast-title">${title}</p><p class="toast-desc">${desc}</p></div>`;
      this.layer.appendChild(el);
      bus.emit("sfx", { name: "achievement" });
      setTimeout(() => {
        el.classList.add("leaving");
        setTimeout(() => el.remove(), 600);
      }, 2600);
    }
  };

  // js/main.js
  function fitStage() {
    const root = document.getElementById("game-root");
    if (!root) return;
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    root.style.transform = `scale(${scale})`;
  }
  async function boot() {
    fitStage();
    window.addEventListener("resize", fitStage);
    const saveManager = new SaveManager();
    saveManager.load();
    const game = new Game({ saveManager });
    const scroll = new ScrollPanel({ mount: document.getElementById("panel-layer") });
    const dialogue = new Dialogue({ layer: document.getElementById("dialogue-layer") });
    const puzzle = new PuzzleEngine({ dialogue });
    const hint = new HintSystem({ scroll });
    const timer = new Timer({ saveManager });
    const ability = new AbilityMeter({ saveManager });
    const audio = new AudioManager({ saveManager });
    const notify = new Notification({ layer: document.getElementById("toast-layer") });
    bus.once("game:start", () => {
      const d = saveManager.data;
      d.visits = (d.visits || 0) + 1;
      if (d.visits >= 3) bus.emit("achievement:unlock", { id: "ach_20" });
      saveManager.save({});
    });
    const sceneManager = new SceneManager({ ctxProvider: game });
    sceneManager.register("opening", () => new OpeningScene()).register("tutorial", () => new TutorialScene()).register("level1", () => new LevelScene("level1")).register("level2", () => new LevelScene("level2")).register("level3", () => new LevelScene("level3")).register("level4", () => new LevelScene("level4")).register("level5", () => new LevelScene("level5")).register("ending", () => new EndingScene()).register("result", () => new ResultScene());
    game.sceneManager = sceneManager;
    game.systems = { dialogue, puzzle, scroll, hint, timer, ability, audio, notify, layers: sceneManager.layers };
    const hud = new HUD({
      getItems: () => (saveManager.data?.inventory || []).map((id) => {
        const v = getVerse(id);
        return v ? { id, name: v.name, icon: "📜" } : { id, name: id, icon: "📦" };
      })
    });
    window.__lianjing = { game, bus, saveManager, sceneManager, hud, dialogue, puzzle, hint, timer, ability, audio };
    bus.once("game:start", ({ resume, entry }) => {
      console.log(`[蓮境] 啟動：${resume ? "續玩" : "新局"} → ${entry}`);
      const bootEl = document.getElementById("boot-screen");
      if (bootEl) setTimeout(() => bootEl.classList.add("hide"), 600);
    });
    await game.start();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>
